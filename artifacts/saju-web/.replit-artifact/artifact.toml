kind = "web"
previewPath = "/"
title = "사주 & 운세"
version = "1.0.0"
id = "artifacts/saju-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20376
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/saju-web run dev"

[services.env]
PORT = "20376"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/saju-web", "run", "build"]
publicDir = "artifacts/saju-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
