openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification for Saju & Fortune website
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: saju
    description: Saju (Four Pillars of Destiny) operations
  - name: fortune
    description: Fortune and daily luck operations
  - name: manseryok
    description: Korean Almanac (Manseryok) operations
  - name: Auth
    description: Browser authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /saju/calculate:
    post:
      operationId: calculateSaju
      tags: [saju]
      summary: Calculate Saju (Four Pillars)
      description: Calculate the four pillars of destiny based on birth date and time
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SajuRequest"
      responses:
        "200":
          description: Saju calculation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SajuResult"

  /fortune/daily:
    get:
      operationId: getDailyFortune
      tags: [fortune]
      summary: Get daily fortune (일진)
      description: Get today's fortune and luck information
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
            description: Date in YYYY-MM-DD format (defaults to today)
        - name: birthYear
          in: query
          required: false
          schema:
            type: string
            description: Birth year for personalized fortune
        - name: birthMonth
          in: query
          required: false
          schema:
            type: string
            description: Birth month for personalized fortune
        - name: birthDay
          in: query
          required: false
          schema:
            type: string
            description: Birth day for personalized fortune
      responses:
        "200":
          description: Daily fortune result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyFortune"

  /manseryok/date:
    get:
      operationId: getManseryokDate
      tags: [manseryok]
      summary: Get Manseryok info for a date
      description: Get Korean almanac (Manseryok) data for a specific date
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            description: Date in YYYY-MM-DD format
      responses:
        "200":
          description: Manseryok date info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManseryokDate"

  /manseryok/month:
    get:
      operationId: getManseryokMonth
      tags: [manseryok]
      summary: Get Manseryok info for a month
      description: Get Korean almanac data for a full month
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: string
        - name: month
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Manseryok month info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManseryokMonth"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserEnvelope"

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      responses:
        "302":
          description: Redirect to OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      responses:
        "302":
          description: Redirect after login.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear session and begin OIDC logout
      responses:
        "302":
          description: Redirect to OIDC provider logout URL.

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SajuRequest:
      type: object
      properties:
        birthYear:
          type: integer
          description: Birth year (e.g. 1990)
        birthMonth:
          type: integer
          description: Birth month (1-12)
        birthDay:
          type: integer
          description: Birth day (1-31)
        birthHour:
          type: integer
          description: Birth hour in 24h format (0-23), -1 if unknown
        birthMinute:
          type: integer
          description: Birth minute (0-59)
        gender:
          type: string
          enum: [male, female]
          description: Gender for fortune calculation
        calendarType:
          type: string
          enum: [solar, lunar]
          description: Whether birth date is in solar or lunar calendar
      required:
        - birthYear
        - birthMonth
        - birthDay
        - gender
        - calendarType

    SajuPillar:
      type: object
      properties:
        heavenlyStem:
          type: string
          description: Heavenly stem (천간)
        earthlyBranch:
          type: string
          description: Earthly branch (지지)
        heavenlyStemElement:
          type: string
          description: Five element of heavenly stem (오행)
        earthlyBranchElement:
          type: string
          description: Five element of earthly branch (오행)
        heavenlyStemKorean:
          type: string
        earthlyBranchKorean:
          type: string
        zodiac:
          type: string
          description: Zodiac animal (띠)
      required:
        - heavenlyStem
        - earthlyBranch
        - heavenlyStemElement
        - earthlyBranchElement
        - heavenlyStemKorean
        - earthlyBranchKorean
        - zodiac

    ElementCount:
      type: object
      properties:
        wood:
          type: integer
        fire:
          type: integer
        earth:
          type: integer
        metal:
          type: integer
        water:
          type: integer
      required:
        - wood
        - fire
        - earth
        - metal
        - water

    SajuResult:
      type: object
      properties:
        yearPillar:
          $ref: "#/components/schemas/SajuPillar"
        monthPillar:
          $ref: "#/components/schemas/SajuPillar"
        dayPillar:
          $ref: "#/components/schemas/SajuPillar"
        hourPillar:
          $ref: "#/components/schemas/SajuPillar"
        elementBalance:
          $ref: "#/components/schemas/ElementCount"
        dominantElement:
          type: string
          description: The strongest element in the chart
        lackingElement:
          type: string
          description: The weakest element in the chart
        dayMasterElement:
          type: string
          description: The day master element
        personality:
          type: string
          description: Personality description based on saju
        fortune:
          type: string
          description: Overall fortune description
        career:
          type: string
          description: Career fortune
        love:
          type: string
          description: Love and relationship fortune
        health:
          type: string
          description: Health fortune
        luckyNumbers:
          type: array
          items:
            type: integer
        luckyColors:
          type: array
          items:
            type: string
        luckyDirections:
          type: array
          items:
            type: string
        zodiac:
          type: string
        lunarBirthDate:
          type: string
          description: Lunar calendar date if input was solar
      required:
        - yearPillar
        - monthPillar
        - dayPillar
        - elementBalance
        - dominantElement
        - lackingElement
        - dayMasterElement
        - personality
        - fortune
        - career
        - love
        - health
        - luckyNumbers
        - luckyColors
        - luckyDirections
        - zodiac

    DailyFortune:
      type: object
      properties:
        date:
          type: string
        lunarDate:
          type: string
          description: Lunar calendar date
        dayGanzi:
          type: string
          description: Day's heavenly stem and earthly branch (일진)
        dayHeavenlyStem:
          type: string
        dayEarthlyBranch:
          type: string
        dayElement:
          type: string
        dayZodiac:
          type: string
        overallScore:
          type: integer
          description: Overall luck score (0-100)
        overallFortune:
          type: string
          description: Overall fortune description
        moneyScore:
          type: integer
        moneyFortune:
          type: string
        loveScore:
          type: integer
        loveFortune:
          type: string
        careerScore:
          type: integer
          description: Career luck score
        careerFortune:
          type: string
        healthScore:
          type: integer
        healthFortune:
          type: string
        luckyHours:
          type: array
          items:
            type: string
          description: Lucky hours of the day
        luckyColors:
          type: array
          items:
            type: string
        luckyNumbers:
          type: array
          items:
            type: integer
        luckyDirection:
          type: string
        avoidDirection:
          type: string
        advice:
          type: string
          description: Daily advice
        monthGanzi:
          type: string
        yearGanzi:
          type: string
      required:
        - date
        - lunarDate
        - dayGanzi
        - dayHeavenlyStem
        - dayEarthlyBranch
        - dayElement
        - dayZodiac
        - overallScore
        - overallFortune
        - moneyScore
        - moneyFortune
        - loveScore
        - loveFortune
        - careerScore
        - careerFortune
        - healthScore
        - healthFortune
        - luckyHours
        - luckyColors
        - luckyNumbers
        - luckyDirection
        - avoidDirection
        - advice
        - monthGanzi
        - yearGanzi

    ManseryokDay:
      type: object
      properties:
        solar:
          type: string
          description: Solar date (YYYY-MM-DD)
        lunar:
          type: string
          description: Lunar date (MM-DD)
        lunarLeap:
          type: boolean
          description: Is this a leap month
        dayGanzi:
          type: string
          description: Day's ganzi (천간지지)
        dayHeavenlyStem:
          type: string
        dayEarthlyBranch:
          type: string
        dayElement:
          type: string
        dayZodiac:
          type: string
        solarTerm:
          type: string
          description: Solar term (절기) if applicable
        luckyDay:
          type: boolean
        inauspiciousDay:
          type: boolean
        dayDescription:
          type: string
      required:
        - solar
        - lunar
        - lunarLeap
        - dayGanzi
        - dayHeavenlyStem
        - dayEarthlyBranch
        - dayElement
        - dayZodiac
        - luckyDay
        - inauspiciousDay

    ManseryokDate:
      type: object
      properties:
        day:
          $ref: "#/components/schemas/ManseryokDay"
        yearGanzi:
          type: string
        monthGanzi:
          type: string
        yearElement:
          type: string
        monthElement:
          type: string
        yearZodiac:
          type: string
      required:
        - day
        - yearGanzi
        - monthGanzi
        - yearElement
        - monthElement
        - yearZodiac

    ManseryokMonth:
      type: object
      properties:
        year:
          type: integer
        month:
          type: integer
        yearGanzi:
          type: string
        monthGanzi:
          type: string
        yearZodiac:
          type: string
        days:
          type: array
          items:
            $ref: "#/components/schemas/ManseryokDay"
      required:
        - year
        - month
        - yearGanzi
        - monthGanzi
        - yearZodiac
        - days

    AuthUser:
      type: object
      required: [id]
      properties:
        id:
          type: string
        email:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        profileImageUrl:
          type: string
          nullable: true

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/AuthUser"
            - type: "null"
